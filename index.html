<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Literature Citation Finder</title>
    <meta name="description" content="Paste a paragraph and get verified space research citations instantly.">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="text-size-medium">
    
    <header class="app-header">
        <div class="header-container">
            <div class="header-titles">
                <h1>Space Literature Citation Finder</h1>
                <p>Paste a paragraph and get verified citations instantly.</p>
            </div>
            <div class="header-controls">
                <!-- Accessibility Controls -->
                <div class="acc-controls" role="group" aria-label="Accessibility Controls">
                    <button id="btn-font-small" aria-label="Small font size" title="Small font size">A-</button>
                    <button id="btn-font-medium" aria-label="Medium font size" title="Medium font size" class="active">A</button>
                    <button id="btn-font-large" aria-label="Large font size" title="Large font size">A+</button>
                    <button id="btn-theme-toggle" aria-label="Toggle light/dark mode" title="Toggle Theme">🌓</button>
                </div>
                <!-- Auth Container -->
                <div id="auth-container">
                    <button id="btn-google-signin" class="btn-secondary" aria-label="Sign in with Google">Sign In with Google</button>
                    <div id="user-info" class="hidden">
                        <span id="user-name"></span>
                        <button id="btn-logout" class="btn-text" aria-label="Log out">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="input-section" aria-labelledby="input-heading">
            <h2 id="input-heading" class="sr-only">Input Paragraph</h2>
            
            <div class="textarea-wrapper">
                <label for="paragraph-input" class="sr-only">Enter your research paragraph</label>
                <textarea 
                    id="paragraph-input" 
                    placeholder="Enter your space research, microgravity, or aerospace engineering paragraph here..." 
                    aria-label="Enter your research paragraph"
                    rows="6"></textarea>
                <button id="btn-read-input" class="btn-icon" aria-label="Read paragraph aloud" title="Read Aloud">🔊</button>
            </div>

            <div class="action-bar">
                <button id="btn-generate" class="btn-primary" aria-label="Generate Citations">Generate Citations</button>
                <div class="secondary-actions">
                    <button id="btn-copy-all" class="btn-secondary hidden" aria-label="Copy All Citations">Copy All</button>
                    
                    <div class="project-actions hidden" id="project-actions">
                        <select id="project-select" aria-label="Select a project">
                            <option value="">Select Project...</option>
                            <!-- Populated by JS -->
                        </select>
                        <button id="btn-add-to-project" class="btn-secondary" aria-label="Add Citations to Project">Add to Project</button>
                        <button id="btn-create-project" class="btn-outline" aria-label="Create New Project">+ New</button>
                    </div>
                </div>
            </div>

            <div id="notification-area" class="notification-area" role="status" aria-live="polite"></div>
        </section>

        <section class="results-section hidden" id="results-section" aria-labelledby="results-heading">
            <h2 id="results-heading">Citations</h2>
            <div id="citations-container" class="citations-grid">
                <!-- Citation Cards Injected Here -->
            </div>
            
            <div class="paragraph-results">
                <h3>Annotated Paragraph</h3>
                <div id="annotated-paragraph" class="annotated-box" aria-live="polite">
                    <!-- Text with footnotes injected here -->
                </div>
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <p>Built with Antigravity 🚀</p>
        <p>Space-Accessible Design • WCAG 2.2 AA</p>
    </footer>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="projects.js"></script>
    <!-- Core App Logic -->
    <script type="module" src="script.js"></script>
</body>
</html>
